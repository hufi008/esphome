# common/bme280.yaml

esphome:
  build_flags:
    - "-DHAVE_ENVIRONMENT"
    - "-DHAVE_ENVIRONMENT_TEMP"
    - "-DHAVE_ENVIRONMENT_HUM"
    - "-DHAVE_ENVIRONMENT_PRESS"
    - "-DHAVE_ENVIRONMENT_HEATER"
  
substitutions:
  # Environment BME280
  bme_addr:      "0x76"
  # VCC: 3V3
  # sda, scl vom i2c_bus

sensor:
  - id: !remove room_temp
  - id: !remove room_hum
  - id: !remove room_press
  - id: !remove room_heater
  - platform: bme280_i2c
    id: envir_id
    update_interval: 60s
    address: 0x76
    temperature:
      id: room_temp
      name: Temperature
      device_class: temperature
      state_class: measurement      
    humidity:
      id: room_hum
      name: Humidity
      device_class: humidity
      state_class: measurement      
    pressure:
      id: room_press
      name: Pressure
      device_class: atmospheric_pressure
      state_class: measurement



