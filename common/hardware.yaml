display:
  - platform: ssd1306_i2c
    model: SSD1306_128X64
    id: display_id
    address: 0x3c
    update_interval: 50ms
    lambda: |-
      // -------------------------------------------------------
      // 1a. GELBER HEADER-BEREICH (Pixel 0–15)
      // -------------------------------------------------------
      
      // Symbole rechts (jeweils 16x16)
      for (int i = 0; i < 4; i++) {
        auto* img = id(status_symbols)[i];
        
        // Prüft penibel, ob der Zeiger existiert UND nicht die Standard-Leeradresse 0x0 ist
        if (img != nullptr && img != 0) {
          it.image(112 - (i * 16), 0, img);
        }
      }

      // -------------------------------------------------------
      // 1b. BLAUER CONTENT-BEREICH (Pixel 16–63)
      // -------------------------------------------------------
      // Trennlinie zwischen GELB (oben) und BLAU (unten)
      it.line(0,15,127,15);
      //it.rectangle(0, 16, 128, 48);

      int cx = 64;
      int cy = 40;
      int width = 128;
      
      // Titel links
      it.print(0, 0, id(font_medium), id(title_text).c_str());
      
      if (id(image_icon) != nullptr) {
        it.image(1, 21, id(image_icon));
        cx+=16;
        width-=32;
      }

      auto scroll_marquee = [&](int cx, int cy, int width, display::BaseFont *font, const std::string &text) {
        // Textbreite messen
        int tx, ty, tw, th;
        it.get_text_bounds(cx, cy, text.c_str(), font, TextAlign::CENTER, &tx, &ty, &tw, &th);
      
        int tw2 = tw / 2;
        int w2 = width / 2;
        tx = cx - w2;   
        tw = width;
      
        // Clipping-Bereich setzen
        it.start_clipping(tx, ty, tx + tw, ty + th);
      
        if (tw2 > w2) {
            float max_amplitude = tw2 - w2; 
            
            // OPTISCHE FEINEINSTELLUNG:
            const float DURATION_MOVE_MS = 3000.0f; // Zeit für eine Richtung (3 Sek. = sehr entspannt)
            const float DURATION_PAUSE_MS = 1200.0f; // Standzeit am Rand in Millisekunden
            
            // Ein kompletter Zyklus (Hinweg + Pause + Rückweg + Pause)
            float total_cycle_ms = (DURATION_MOVE_MS * 2.0f) + (DURATION_PAUSE_MS * 2.0f);
            float current_time = fmodf(millis(), total_cycle_ms);
            
            float offset = 0.0f;
            
            if (current_time < DURATION_PAUSE_MS) {
                // 1. Pause am linken Rand
                offset = -max_amplitude;
            } 
            else if (current_time < DURATION_PAUSE_MS + DURATION_MOVE_MS) {
                // 2. Weiche Bewegung von links nach rechts (Ease-In-Out)
                float t = (current_time - DURATION_PAUSE_MS) / DURATION_MOVE_MS; // Fortschritt 0.0 bis 1.0
                
                // Offizielle Smoothstep-Formel: Erzeugt perfekte Beschleunigung und Bremsung
                float smooth_t = t * t * (3.0f - 2.0f * t); 
                
                offset = -max_amplitude + (smooth_t * max_amplitude * 2.0f);
            } 
            else if (current_time < (DURATION_PAUSE_MS * 2.0f) + DURATION_MOVE_MS) {
                // 3. Pause am rechten Rand
                offset = max_amplitude;
            } 
            else {
                // 4. Weiche Bewegung von rechts nach links (Ease-In-Out)
                float t = (current_time - (DURATION_PAUSE_MS * 2.0f) - DURATION_MOVE_MS) / DURATION_MOVE_MS;
                float smooth_t = t * t * (3.0f - 2.0f * t);
                
                offset = max_amplitude - (smooth_t * max_amplitude * 2.0f);
            }
            
            // Zeichnet den Text perfekt ausbalanciert
            it.print(cx - offset, cy, font, TextAlign::CENTER, text.c_str());
        } else {
            it.print(cx, cy, font, TextAlign::CENTER, text.c_str());
        }
      
        // Clipping beenden
        it.end_clipping();
      };


      if (id(idle_message3).empty() && id(idle_message2).empty()) {
        // --- FALL 1: Nur die erste Zeile ist befüllt -> Maximal groß ---
        scroll_marquee(cx, cy, width, id(font_huge), id(idle_message1));

      } else if (id(idle_message3).empty()) {
        // --- FALL 2: Zeile 1 und 2 sind befüllt -> Große Schrift ---
        scroll_marquee(cx, cy - 10, width, id(font_large), id(idle_message1));
        scroll_marquee(cx, cy + 10, width, id(font_large), id(idle_message2));

      } else {
        // --- FALL 3: Alle 3 Zeilen sind befüllt -> Mittlere Schrift ---
        scroll_marquee(cx, cy - 13, width, id(font_medium), id(idle_message1));
        scroll_marquee(cx, cy,      width, id(font_medium), id(idle_message2));
        scroll_marquee(cx, cy + 13, width, id(font_medium), id(idle_message3));
      }

      if (id(page_info_start_time) > 0) {
        uint32_t duration_ms = id(page_info_duration).state * 1000;
        uint32_t progress_ms = millis() - id(page_info_start_time);
        it.line(0, 63, (progress_ms * 127) / duration_ms, 63);
      }
      



######################################################################################
      
# interval für page messages
interval:
  - id: update_timer
    interval: 15s
    then:
      # Phase 1: Display-Texte aktualisieren
      - script.execute: update_data

      # Phase 2: Die permanent gesammelten Peaks der letzten 15s an HA senden
      - lambda: |-
          id(sensor_mic_left_peak).publish_state(id(mic_peak_left));
          id(sensor_mic_right_peak).publish_state(id(mic_peak_right));
          
          //ESP_LOGI("mic_test", "15s-Peak-Report. Left: %d | Right: %d", id(mic_peak_left), id(mic_peak_right));
          
          // Werte sofort nullen, um für die nächsten 15 Sekunden neu zu sammeln
          id(mic_peak_left) = 0;
          id(mic_peak_right) = 0;

# I2S Audio Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin: ${mic_sck_pin}

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: ${spk_lrc_pin}
    i2s_bclk_pin: ${spk_bclk_pin}
   
# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: ${mic_sd_pin}
    pdm: false
    correct_dc_offset: true
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    i2s_mode: primary
    on_data:
      - lambda: |-
          if (x.empty()) return;

          size_t total_bytes = x.size();
          int32_t max_l = 0;
          int32_t max_r = 0;

          // Ein kompletter Stereo-Frame (Links 4 Bytes + Rechts 4 Bytes) benötigt genau 8 Bytes.
          for (size_t i = 0; i + 7 < total_bytes; i += 8) {
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den LINKEN Kanal
            int32_t l_val = (int32_t)((x[i + 3] << 24) | (x[i + 2] << 16) | (x[i + 1] << 8) | x[i]);
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den RECHTEN Kanal
            int32_t r_val = (int32_t)((x[i + 7] << 24) | (x[i + 6] << 16) | (x[i + 5] << 8) | x[i + 4]);

            // Absolutwerte für die Peak-Messung
            int32_t abs_l = std::abs(l_val);
            int32_t abs_r = std::abs(r_val);

            if (abs_l > max_l) max_l = abs_l;
            if (abs_r > max_r) max_r = abs_r;
          }

          // Skalierung auf den 16-Bit-Bereich (>> 16) wie in Ihrem Original
          int16_t peak_l_16 = (int16_t)(max_l >> 16);
          int16_t peak_r_16 = (int16_t)(max_r >> 16);

          // Zuweisung an Ihre aktuellen globalen Peak-Speicher
          if (peak_l_16 > id(mic_peak_left))  id(mic_peak_left) = peak_l_16;
          if (peak_r_16 > id(mic_peak_right)) id(mic_peak_right) = peak_r_16;


#   [ HOME ASSISTANT / INTERNE AKTIONEN ]
#        │                      │
#        ▼                      ▼
# ┌──────────────────┐  ┌──────────────────┐
# │  Audio Player    │  │ UI Sound Player  │  <-- Die zwei Media Player (YAML)
# │ (media_player_id)│  │(ui_sound_player_id)
# └────────┬─────────┘  └────────┬─────────┘
#          │                     │
#    ┌─────┴────────┐            │
#    │              │            │
#    ▼ (Musik)      ▼ (TTS)      ▼ (Klicks)
# [media_pipe]  [announce_pipe]  [announce_pipe] <-- Die drei Pipelines
#    │              │            │
#    │              │            │
#    │              │            │
#    ▼              ▼            ▼
# ┌──────────────────────┐  ┌──────────────────────┐
# │   on_announcement    │  │   (Keine Trigger!)   │ <-- Hier hängen deine Effekte
# │  [ Startet Effekte ] │  │   [ Absolut ruhig ]  │
# └──┬──────────────┬────┘  └──────────┬───────────┘
#    │              │                  │
#    ▼ (48kHz/Stereo)▼ (16kHz/Mono)    ▼ (16kHz/Mono)
# ┌──────────────┐┌──────────────┐┌──────────────┐
# │  Resampler   ││  Resampler   ││  Resampler   │
# │(media_source_││(announcement_││(ui_source_   │ <-- Berechnen die Sampleraten
# │   speaker)   ││source_speaker││   speaker)   │
# └──────┬───────┘└──────┬───────┘└──────┬───────┘
#        │               │               │
#        ▼               ▼               ▼
#  ┌───────────────┬───────────────┬───────────────┐
#  │ media_mixing_ │ announcement_ │  ui_mixing_   │ <-- Die 3 Mixer-Eingänge
#  │     input     │ mixing_input  │     input     │     (source_speakers)
#  ├───────────────┴───────────────┴───────────────┤
#  │                 audio_mixer                   │ <-- Dein digitaler Mixer
#  └───────────────────────┬───────────────────────┘     (Nativ bis zu 8 Kanäle!)
#                          │
#                          ▼ (Gemischter I2S-Stream: 48kHz / 32bit / Stereo)
#  ┌───────────────────────────────────────────────┐
#  │                  hw_speaker                   │ <-- Hardware-Lautsprecher-Komponente
#  └───────────────────────┬───────────────────────┘
#                          │ (Physische Pins: DIN, BCLK, LRCLK)
#                          ▼
#              [ Verstärker: MAX 98357 ] ──> 🔊 Lautsprecher

# Amplifier MAX 98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${spk_din_pin}
    bits_per_sample: 32bit
    sample_rate: 48000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    buffer_duration: 500ms
    i2s_mode: primary

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never
      - id: ui_mixing_input
        timeout: never        

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input

  # E) Virtueller Resampler für UI-Sounds
  - platform: resampler
    id: ui_source_speaker
    output_speaker: ui_mixing_input

