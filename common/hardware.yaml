media_player:
  - platform: speaker
    id: media_player_id
    name: "Audio Player"
    icon: "mdi:speaker-message"
    buffer_size: 500000
    task_stack_in_psram: true
    volume_initial: 50%
    volume_increment: 5%
    volume_min: 0%
    volume_max: 100%

    media_pipeline:
      speaker: media_source_speaker
      num_channels: 2
      sample_rate: 48000
      format: NONE
    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1
      format: WAV

  - platform: speaker
    id: ui_sound_player_id
    name: "UI Sound Player"
    buffer_size: 64000 
    task_stack_in_psram: true
    entity_category: diagnostic
    volume_initial: 60%

    announcement_pipeline:
      speaker: ui_source_speaker
      num_channels: 1
      sample_rate: 16000
      format: WAV

    on_announcement: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_announce:");'
    on_idle: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_idle:");'
    on_pause: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_pause:");'
    on_play: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_play:");'
    on_volume: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_volume:");'
    on_state: 
      - lambda: 'ESP_LOGI("hardware.yaml", "UI-Player on_state: %s", media_player::media_player_state_to_string(id(media_player_id).state) );'
      
      # - lambda: 'id(on_media_player_state).execute(id(ui_sound_player_id).get_name());'

