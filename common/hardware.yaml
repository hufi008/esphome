# common/hardware.yaml
######################### Configuration

substitutions:
  ### Pin-Belegung
  # Amp Max98357A
  spk_lrc_pin:   "GPIO11"   # LEFT / RIGHT CLOCK
  spk_bclk_pin:  "GPIO10"   # Bit CLOCK
  spk_din_pin:   "GPIO09"   # DATA OUT
  # spk_gain_pin:  100kΩ GND = 15dB, GND = 12dB, nix = 9dB, VCC = 6dB, 100kΩ VCC = 3DB
  # spk_sd_pin:    nix = (L+R)/2, 370kΩ VCC = Rechts, 100kΩ = Links
  # spk_gnd_pin: GND
  # spk_vin_pin: 5V

  # Microphone INMP441
  mic_ws_pin:    "GPIO04"   # WORD SELECT
  mic_sck_pin:   "GPIO05"   # SERIAL CLOCK
  mic_sd_pin:    "GPIO06"   # SERIAL DATA
  # mic_vdd_pin:   3V3
  # mic_gnd_PIN:   GND
  # mic_l/r_pin: GND = Links, VCC = Rechts

  # LED Strip WS2812
  led_din_pin:   "GPIO08"    # DATA IN
  led_count:     "10"        # Number of LEDs
  # VCC: 5V
  # din mit Levelshifter auf 5V heben oder mit 100Ω Widerstand an 3V3 lassen (bei kurzen Strip-Längen)

  # I2C Bus
  i2c_sda_pin:   "GPIO01"    # SERIAL DATA
  i2c_scl_pin:   "GPIO02"    # SERIAL CLOCK
  # i2c_gnd_pin:  GND
  # i2c_vin_pin:  3V3
  
  # Environment
  # der BME/HTU kommt onboard und gibt damit die Reihenfolge von I2C VCC und GND vor.
  # Display OLED SSD1306
  # Beim SSD1306 sind die Versorgungsleitungen umgekeht!!!
  ssd_addr:      "0x3C"
  # ssd_vcc_pin: i2c_vin_pin
  # sdd_gnd_pin: i2s_gnd_pin

  # Button TTP221
  btn_1_pin:     "GPIO15"
  btn_2_pin:     "GPIO16"
  btn_3_pin:     "GPIO17"
  btn_4_pin:     "GPIO18"
  # btn_vcc_pin:   3V3, sonst schrottest du den ESP
  # btn_gnd_pin:   GND

globals:
  - id: is_booting
    type: bool
    initial_value: "false"
  - id: mic_peak_left
    type: 'int32_t'
    initial_value: '0'
  - id: mic_peak_right
    type: 'int32_t'
    initial_value: '0'
    
  - id: idle_color
    type: esphome::Color
    initial_value: 'Color(127, 0, 255)'

  - id: status_symbols
    type: 'image::Image*[4]'
    initial_value: '{nullptr, nullptr, nullptr, nullptr}'
  - id: title_text
    type: std::string
    initial_value: "\"title\""

  - id: page_info_start_time
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: image_icon
    type: 'image::Image*'
    initial_value: '&id(icon_think)'
  - id: idle_message1
    type: std::string
    initial_value: "\"Hallo\""
  - id: idle_message2
    type: std::string
    initial_value: "\"Welt\""
  - id: idle_message3
    type: std::string
    initial_value: "\"Again\""
    
########################## Components

deep_sleep:
  id: deep_sleep_id
  wakeup_pin: 
    number: ${btn_1_pin}
    allow_other_uses: true
  wakeup_pin_mode: INVERT_WAKEUP

button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "Shutdown"
    on_press:
      then:
        # Display ausschalten
        - lambda: 'id(display_id).turn_off();'
        - media_player.mute: media_player_id
        - light.turn_off: ledstrip_id
        - wait_until:
              light.is_off: ledstrip_id
        - delay: 100ms
        - deep_sleep.enter: deep_sleep_id

text:
  - platform: template
    name: "Idle Farbe HEX"
    id: idle_color_hex
    optimistic: false
    min_length: 6
    max_length: 7
    initial_value: "000000"
    restore_value: true
    mode: text
    on_value: 
      then:
        - lambda: |-
            unsigned long hex_value = std::strtoul(x.c_str(), nullptr, 16);
                        
            uint8_t r = (hex_value >> 16) & 0xFF;
            uint8_t g = (hex_value >> 8)  & 0xFF;
            uint8_t b = hex_value         & 0xFF;
            
            id(idle_color) = esphome::Color(r, g, b);
            ESP_LOGD("init", "idle_color: RGB: (%d, %d, %d)", r, g, b);
    set_action:
      then:
        - lambda: |-
            std::string hex = x;
            
            if (!hex.empty() && hex[0] == '#') { hex = hex.substr(1); }
            if (hex.length() != 6) {
              id(idle_color_hex).status_set_error(LOG_STR("Use XXXXXX for HEX-Color"));
              return;
            }
            for (char c : hex) { if (!isxdigit(c)) { 
                id(idle_color_hex).status_set_error(LOG_STR("Use XXXXXX for HEX-Color"));
                return; 
            } }
            
            // Eingabe ist valide -> Zustand akzeptieren
            id(idle_color_hex).status_clear_error();
            id(idle_color_hex).publish_state(hex);

binary_sensor:
  - platform: gpio
    id: btn_1_id
    pin:
      number: ${btn_1_pin}
      allow_other_uses: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      - lambda: 'id(on_btn_press).execute();'
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: 'id(on_btn_1_single_click).execute();'

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: 'id(on_btn_1_double_click).execute();'

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - lambda: 'id(on_btn_1_long_click).execute();'
