    then: 
      - logger.log:
          level: INFO
          format: "on_btn_4_long_click"
      - globals.set:
          id: skip_next_announcement
          value: "true"
      - media_player.speaker.play_on_device_media_file:
          media_file: snd_long_click
          announcement: true
          enqueue: true
      - lambda: |-
          if (id(hw_microphone)->get_mute_state()) {
            id(hw_microphone).set_mute_state(false);
          } else {
            id(hw_microphone).set_mute_state(true);
          }
      - script.execute: update_data
        