###### Audio
# I2S Audio Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin: ${mic_sck_pin}

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: ${amp_lrclk_pin}
    i2s_bclk_pin: ${amp_bclk_pin}
   
# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: ${mic_sd_pin}
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    on_data:
      - lambda: |-
          if (x.empty()) return;

          size_t total_bytes = x.size();
          int32_t max_l = 0;
          int32_t max_r = 0;

          // Ein kompletter Stereo-Frame (Links 4 Bytes + Rechts 4 Bytes) benötigt genau 8 Bytes.
          for (size_t i = 0; i + 7 < total_bytes; i += 8) {
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den LINKEN Kanal
            int32_t l_val = (int32_t)((x[i + 3] << 24) | (x[i + 2] << 16) | (x[i + 1] << 8) | x[i]);
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den RECHTEN Kanal
            int32_t r_val = (int32_t)((x[i + 7] << 24) | (x[i + 6] << 16) | (x[i + 5] << 8) | x[i + 4]);

            // Absolutwerte für die Peak-Messung
            int32_t abs_l = std::abs(l_val);
            int32_t abs_r = std::abs(r_val);

            if (abs_l > max_l) max_l = abs_l;
            if (abs_r > max_r) max_r = abs_r;
          }

          // Skalierung auf den 16-Bit-Bereich (>> 16) wie in Ihrem Original
          int16_t peak_l_16 = (int16_t)(max_l >> 16);
          int16_t peak_r_16 = (int16_t)(max_r >> 16);

          // Zuweisung an Ihre aktuellen globalen Peak-Speicher
          if (peak_l_16 > id(mic_peak_left))  id(mic_peak_left) = peak_l_16;
          if (peak_r_16 > id(mic_peak_right)) id(mic_peak_right) = peak_r_16;    

# interval für page messages
interval:
  - id: update_timer
    interval: 2s
    then:
      # Phase 2: Die permanent gesammelten Peaks der letzten 15s an HA senden
      - lambda: |-
          id(sensor_mic_left_peak).publish_state(id(mic_peak_left));
          id(sensor_mic_right_peak).publish_state(id(mic_peak_right));
          
          ESP_LOGI("mic_test", "15s-Peak-Report. Left: %d | Right: %d", id(mic_peak_left), id(mic_peak_right));
          
          // Werte sofort nullen, um für die nächsten 15 Sekunden neu zu sammeln
          id(mic_peak_left) = 0;
          id(mic_peak_right) = 0;

# Amplifier MAX 98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${amp_din_pin}
    bits_per_sample: 32bit
    sample_rate: 48000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    buffer_duration: 100ms

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input

media_player:
  - platform: speaker
    id: media_player_id
    name: Audio Player
    buffer_size: 1000000
    icon: "mdi:speaker-message"
    task_stack_in_psram: true
    volume_initial: 50%
    volume_increment: 5%
    volume_min: 0%
    volume_max: 100%
    media_pipeline:
      speaker: media_source_speaker
      num_channels: 2
      sample_rate: 48000
      format: MP3
    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1
      format: FLAC
