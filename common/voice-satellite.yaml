# common/voice-satellite.yaml
######################### Configuration

substitutions:
  version: "0.6.1"

  ### Pin-Belegung
  # Amp Max98357
  amp_lrclk_pin:  "GPIO11"   # LEFT / RIGHT CLOCK
  amp_bclk_pin:   "GPIO10"   # Bit CLOCK
  amp_dout_pin:   "GPIO09"   # DATA OUT
  # VCC: 5V
  # GAIN: 100kΩ GND = 15dB, GND = 12dB, nix = 9dB, VCC = 6dB, 100kΩ VCC = 3DB
  # SD: nix = (L+R)/2, 370kΩ VCC = Rechts, 100kΩ = Links
  

  # Microphone INMP441
  mic_ws_pin:    "GPIO04"   # WORD SELECT
  mic_sck_pin:   "GPIO05"   # SERIAL CLOCK
  mic_sd_pin:    "GPIO06"   # SERIAL DATA
  # VCC: 3V3
  # L/R: GND = Links, VCC = Rechts

  # LED Strip WS2812
  led_din_pin:   "GPIO08"    # DATA IN
  led_count:     "10"        # Number of LEDs
  # VCC: 5V
  # din mit Levelshifter auf 5V heben

  # I2C Bus
  i2c_sda_pin:   "GPIO01"    # SERIAL DATA
  i2c_scl_pin:   "GPIO02"    # SERIAL CLOCK
  # VCC: 3V3
  
  # Display OLED SSD1306
  ssd_addr:      "0x3C"
  # VCC: 3V3 bis 5V

  # Button TTP221
  btn_1_pin:     "GPIO15"
  btn_2_pin:     "GPIO16"
  btn_3_pin:     "GPIO17"
  btn_4_pin:     "GPIO18"
  # VCC: 2V bis 5V5

  # Display Modes
  CONTENT_BOOT:     0
  CONTENT_IDLE:     1
  CONTENT_PLAY:     2
  CONTENT_PAUSE:    3
  CONTENT_LISTEN:   4
  CONTENT_THINK:    5

  OVERLAY_NONE:     0
  OVERLAY_VOLUME:   1
  OVERLAY_ERROR:    2
  OVERLAY_ALARM:    3
  OVERLAY_ANNOUNCE: 4

esphome:
  project:
    name: "hufi.smart_speaker"
    version: ${version}
  on_boot:
    - priority: 600
      then:
        - script.execute: on_esp_boot_600
    - priority: 250
      then:
        - script.execute: on_esp_boot_250
    - priority: 200
      then:
        - script.execute: on_esp_boot_200
    - priority: -100
      then:
        - script.execute: on_esp_boot_minus100
            
    
# Enable Home Assistant API
api:
  on_client_connected:
    - script.execute: on_api_client_connect
  on_client_disconnected:
    - script.execute: on_api_client_disconnect

wifi:
  on_connect:
    - script.execute: on_wifi_connect
  on_disconnect:
    - script.execute: on_wifi_disconnect
# Enable logging
logger:
  level: DEBUG

# SSL-Zertifikatsprüfung für Streams abschalten (schont Heap-Memory & CPU)
http_request:
  verify_ssl: false

# High-Performance Netzwerk-Puffer drosseln (verhindert Buffer-Overflows im File-Reader)
network:
  enable_high_performance: false

globals:
  - id: is_booting
    type: bool
    initial_value: "false"
  - id: skip_next_announcement
    type: bool
    initial_value: "false"
  - id: mic_peak_left
    type: 'int32_t'
    initial_value: '0'
  - id: mic_peak_right
    type: 'int32_t'
    initial_value: '0'
    
  - id: content_mode
    type: int
    initial_value: "0"    
  - id: overlay_mode
    type: int
    initial_value: "0"
  - id: content_mode_text
    type: std::vector<std::string>
    initial_value: '{"BOOT", "IDLE", "PLAY", "PAUSE", "LISTEN", "THINK", "ANNOUNCE"}'  
  - id: overlay_mode_text
    type: std::vector<std::string>
    initial_value: '{"NONE", "VOLUME", "ERROR", "ALARM", "ANNOUNCE"}'  

  - id: status_symbols
    type: 'image::Image*[4]'
    initial_value: '{nullptr, nullptr, nullptr, nullptr}'
  - id: title_text
    type: std::string
    initial_value: "\"title\""

  - id: image_icon
    type: 'image::Image*'
    initial_value: '&id(icon_think)'
  - id: idle_message1
    type: std::string
    initial_value: "\"Hallo\""
  - id: idle_message2
    type: std::string
    initial_value: "\"Welt\""
  - id: idle_message3
    type: std::string
    initial_value: "\"Again\""

  - id: command_message
    type: std::string
    initial_value: "\"command\""
  - id: intent_message
    type: std::string
    initial_value: "\"intent\""
  - id: announce_message
    type: std::string
    initial_value: "\"announce\""
  - id: url_message
    type: std::string
    initial_value: "\"url\""
  - id: alarm_message
    type: std::string
    initial_value: "\"alarm\""
  - id: error_code
    type: std::string
    initial_value: "\"code\""
  - id: error_message
    type: std::string
    initial_value: "\"error\""

########################## Components

time:
  - platform: homeassistant
    id: esptime
    on_time_sync: 
      then:
        - script.execute: on_time_time_sync

deep_sleep:
  id: deep_sleep_id
  wakeup_pin: 
    number: ${btn_1_pin}
    allow_other_uses: true
  wakeup_pin_mode: INVERT_WAKEUP
  
button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "Shutdown"
    on_press:
      then:
        # Display ausschalten
        - lambda: 'id(display_id).turn_off();'
        - media_player.mute: media_player_id
        - light.turn_off: ledstrip_id
        - wait_until:
              light.is_off: ledstrip_id
        - delay: 100ms
        - deep_sleep.enter: deep_sleep_id

binary_sensor:
  - platform: gpio
    id: btn_up_id
    pin:
      number: ${btn_1_pin}
      allow_other_uses: true
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_1_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_1_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_1_long_click"    
  - platform: gpio
    id: btn_down_id
    pin:
      number: ${btn_2_pin}
      allow_other_uses: false
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_2_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_2_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_2_long_click"    
  - platform: gpio
    id: btn_left_id
    pin:
      number: ${btn_3_pin}
      allow_other_uses: false
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_3_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_3_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_3_long_click"    
  - platform: gpio
    id: btn_right_id
    pin:
      number: ${btn_4_pin}
      allow_other_uses: false
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_4_single_click"

      # --- DOPPELKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.5s
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - script.execute: "on_btn_4_double_click"

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - script.execute: "on_btn_4_long_click"    

light:
  - platform: esp32_rmt_led_strip
    id: ledstrip_id
    name: "LED Status"
    chipset: WS2812
    pin: ${led_din_pin}
    num_leds: ${led_count}
    rgb_order: GRB
    restore_mode: RESTORE_AND_ON
    icon: "mdi:led-strip"
    use_dma: true
    rmt_symbols: 192
    use_psram: true
    effects:
      - addressable_scan:
          name: Scan slow
          move_interval: 0.2s
          scan_width: 3
      - addressable_rainbow:
          speed: 8
          width: 12
          name: Rainbow
      - addressable_twinkle:
          name: Twinkle
          progress_interval: 4ms
          twinkle_probability: 5%
      - addressable_color_wipe:
          name: Color Wipe
          add_led_interval: 0.1s
          
      # Content Mode Effects
      # Effect CONTENT_BOOT
      - addressable_lambda:
          name: "Effect CONTENT_0" # BOOT
          update_interval: 50ms
          lambda: |-
            // Definiert die Geschwindigkeit und zwingt den Wert in eine Endlosschleife von 0 bis 255
            int wave_time = (millis() / 12) % 256;

            for (int i = 0; i < it.size(); i++) {
              // Berechnet den Helligkeitsverlauf basierend auf der LED-Position
              int v = wave_time + abs(i - it.size() / 2.0f) * 16;
              
              // Nutzt Modulo, damit die Welle endlos von außen nach innen "durchläuft"
              v = v % 256; 
              
              it[i] = Color(0, 0, v);
            }

      # Effect CONTENT_IDLE
      - addressable_lambda:
          name: "Effect CONTENT_1" # IDLE
          update_interval: 16ms
          lambda: |-
            auto color = id(ledstrip_id).remote_values;

            uint8_t r = color.get_red() * 255;
            uint8_t g = color.get_green() * 255;
            uint8_t b = color.get_blue() * 255;

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(r, g, b);
            }

      # Effect CONTENT_PLAY
      - addressable_rainbow:
          name: "Effect CONTENT_2" # PLAY
          speed: 16
          width: 12
          
      # Effect CONTENT_PAUSE
      - addressable_lambda:
          name: "Effect CONTENT_3" # PAUSE
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 500.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, y, 0);  // Gelb
            }
      # Effect CONTENT_LISTEN
      - addressable_lambda:
          name: "Effect CONTENT_4"  # LISTEN
          update_interval: 20ms
          lambda: |-
            const int count = it.size();
            const float t = millis() / 250.0f;   // Puls-Geschwindigkeit
            const float pulse = (sin(t) + 1.0f) * 0.5f;  // 0..1
      
            const float center = (count - 1) / 2.0f;     // Mitte der LEDs
      
            for (int i = 0; i < count; i++) {
              float d = fabsf(i - center);               // Abstand zur Mitte
              float falloff = 1.0f - (d / center);       // 1.0 in der Mitte, 0.0 außen
              if (falloff < 0.0f) falloff = 0.0f;
      
              int brightness = int( falloff * pulse * 255 );
      
              // Farbe: Cyan-Blau wie dein Listening-Effekt
              it[i] = Color(0, 64, brightness);
            }
      # Effect CONTENT_THINK
      - addressable_lambda:
          name: "Effect CONTENT_5" # THINK
          update_interval: 20ms
          lambda: |-
            int pos = (millis() / 40) % it.size();
            pos = it.size() - pos;
            for (int i = 0; i < it.size(); i++) {
              int d = abs(i - pos);
              int b = max(0, 150 - d * 40);
              it[i] = Color(b, 0, b);
            }

      # Overlay Mode Effects
      # Effect OVERLAY_NONE
      - addressable_lambda:
          name: "Effect OVERLAY_0"
          update_interval: 250ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0,0,0);
            }
      # Effect OVERLAY_VOLUME
      - addressable_lambda:
          name: "Effect OVERLAY_1"
          update_interval: 20ms
          lambda: |-
            if (id(media_player_id).is_muted()) {
              float t = (millis() % 800) / 800.0f;
              float fade = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color(0, 0, int(128 * fade));
              }
              return;
            }

            float index = id(media_player_id).volume * it.size();

            for (int i = 0; i < it.size(); i++) {
              float fade = std::clamp(index - i, 0.2f, 1.0f);
              // falschrum eingebaut
              it[i] = Color(0, int(127*fade), int(255*fade));
            }
      # Effect OVERLAY_ERROR
      - addressable_lambda:
          name: "Effect OVERLAY_2"
          update_interval: 40ms
          lambda: |-
            float t = (millis() % 800) / 800.0f;
            float b = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(int(200 * b), 0, 0);
            }
      # Effect CONTENT_ALARM
      - addressable_lambda:
          name: "Effect OVERLAY_3"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 250.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, 0, 0);  // Rot
            }
      # Effect OVERLAY_ANNOUNCE
      - addressable_lambda:
          name: "Effect OVERLAY_4"
          update_interval: 20ms
          lambda: |-
            const int count = it.size();

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 120 - d * 40);  // 120 = hell, 40 = Abfall pro LED

              it[i] = Color(b+75, b, b+75);  // Cyan-Blau
            }
            
          
