# common/voice-satellite.yaml
######################### Configuration

substitutions:
  version: "0.7.0"

  # Display Modes
  CONTENT_BOOT:     0
  CONTENT_IDLE:     1
  CONTENT_PLAY:     2
  CONTENT_PAUSE:    3
  CONTENT_LISTEN:   4
  CONTENT_THINK:    5

  OVERLAY_NONE:     0
  OVERLAY_VOLUME:   1
  OVERLAY_ERROR:    2
  OVERLAY_ALARM:    3
  OVERLAY_ANNOUNCE: 4

esphome:
  project:
    name: "hufi.smart_speaker"
    version: ${version}
  on_boot:
    - priority: 250
      then:
        # - media_player.turn_on: media_player_id
        # - media_player.turn_on: ui_sound_player_id
        # - media_player.volume_set:
        #     id: media_player_id
        #     volume: 20%
        # - media_player.volume_set:
        #     id: ui_sound_player_id
        #     volume: 30%
        # - speaker.volume_set:
        #     id: media_mixing_input
        #     volume: 15%
        # - speaker.volume_set:
        #     id: announcement_mixing_input
        #     volume: 25%
        # - speaker.volume_set:
        #     id: ui_mixing_input
        #     volume: 35%
        - lambda: |-
            id(set_content_mode).execute(${CONTENT_BOOT});
            id(is_booting) = true;
    - priority: 200
      then:
        - lambda: |-
            id(play_ui_sound).execute(snd_boot);
            
    
# Enable Home Assistant API
api:
  on_client_connected:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_api_client_connected");
        id(play_ui_sound).execute(snd_connect);
        id(update_data).execute();
  on_client_disconnected:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_api_client_disconnected");
        id(play_ui_sound).execute(snd_disconnect);
        id(update_data).execute();

wifi:
  on_connect:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_wifi_connect");
        id(play_ui_sound).execute(snd_connect);
        id(update_data).execute();
  on_disconnect:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_wifi_disconnect");
        id(play_ui_sound).execute(snd_disconnect);
        id(update_data).execute();

globals:
  - id: is_ducking
    type: bool
    initial_value: "false"
    
  - id: content_mode
    type: int
    initial_value: "0"    
  - id: overlay_mode
    type: int
    initial_value: "0"
  - id: content_mode_text
    type: std::vector<std::string>
    initial_value: '{"BOOT", "IDLE", "PLAY", "PAUSE", "LISTEN", "THINK", "ANNOUNCE"}'  
  - id: overlay_mode_text
    type: std::vector<std::string>
    initial_value: '{"NONE", "VOLUME", "ERROR", "ALARM", "ANNOUNCE"}'  

  - id: command_message
    type: std::string
    initial_value: "\"command\""
  - id: intent_message
    type: std::string
    initial_value: "\"intent\""
  - id: announce_message
    type: std::string
    initial_value: "\"announce\""
  - id: url_message
    type: std::string
    initial_value: "\"url\""
  - id: alarm_message
    type: std::string
    initial_value: "\"alarm\""
  - id: error_code
    type: std::string
    initial_value: "\"code\""
  - id: error_message
    type: std::string
    initial_value: "\"error\""

########################## Components

time:
  - id: !extend esptime
    on_time_sync:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_time_time_sync");

          if (id(is_booting)) {        
            id(is_booting) = false;
            id(set_content_mode).execute(${CONTENT_IDLE});
          }

number:
  - platform: template
    id: content_mode_select
    name: "Content Mode"
    entity_category: diagnostic
    min_value: 0
    max_value: 5
    step: 1    
    initial_value: "${CONTENT_BOOT}"
    optimistic: True
    set_action:
      - lambda: |-
          id(set_content_mode).execute(x);
  - platform: template
    id: overlay_mode_select
    name: "Overlay Mode"
    entity_category: diagnostic
    min_value: 0
    max_value: 4
    step: 1
    initial_value: "${OVERLAY_NONE}"
    set_action:
      - lambda: |-
          id(set_overlay_mode).execute(x);

binary_sensor:
  - id: !extend btn_1_id
    on_press:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_btn_1_press");
          id(play_ui_sound).execute(snd_click);
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_1_single_click");
              id(play_ui_sound).execute(snd_single_click);
              // ESP_LOGW(__FILE__, "hw_speaker                volume %f", id(hw_speaker).get_volume() );
              // ESP_LOGW(__FILE__, "media_mixing_input        volume %f", id(media_mixing_input).get_volume() );
              // ESP_LOGW(__FILE__, "announcement_mixing_input volume %f", id(announcement_mixing_input).get_volume() );
              // ESP_LOGW(__FILE__, "ui_mixing_input           volume %f", id(ui_mixing_input).get_volume() );
              // ESP_LOGW(__FILE__, "media_player_id           volume %f", id(media_player_id).volume );
              // ESP_LOGW(__FILE__, "ui_sound_player_id        volume %f", id(ui_sound_player_id).volume );

          - lambda: |-
              ESP_LOGI(__FILE__, "voice_assist start by button");
              id(play_ui_sound).execute(snd_wake);
          - voice_assistant.start:
              wake_word: "Okay Nabu"
      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_1_long_click");
              id(play_ui_sound).execute(snd_long_click);
          - if:
              condition:
                - media_player.is_off: media_player_id
              then:
                - media_player.turn_on: media_player_id
              else:
                - media_player.turn_off: media_player_id

  - id: !extend btn_2_id
    on_press:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_btn_2_press");
          id(play_ui_sound).execute(snd_click);
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_2_single_click");
              id(play_ui_sound).execute(snd_single_click);
          - media_player.toggle: media_player_id
      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_2_long_click");
              id(play_ui_sound).execute(snd_long_click);
          - media_player.stop: media_player_id

  - id: !extend btn_3_id
    on_press:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_btn_3_press");
          id(play_ui_sound).execute(snd_click);
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_3_single_click");
              id(play_ui_sound).execute(snd_single_click);
          - media_player.volume_down: media_player_id

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_3_long_click");
              id(play_ui_sound).execute(snd_long_click);
          - if:
              condition:
                media_player.is_muted: media_player_id
              then:
                media_player.unmute: media_player_id
              else:
                media_player.mute: media_player_id
          - script.execute: update_data

  - id: !extend btn_4_id
    on_press:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_btn_4_press");
          id(play_ui_sound).execute(snd_click);
    on_multi_click:
     # --- EINFACHKLICK ---
      - timing:
          - ON for at most 0.5s
          - OFF for at least 0.5s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_4_single_click");
              id(play_ui_sound).execute(snd_single_click);
          - media_player.volume_up: media_player_id

      # --- LANGER KLICK ---
      - timing:
          - ON for at least 1.0s
        then:
          - lambda: |-
              ESP_LOGI(__FILE__, "on_btn_4_long_click");
              id(play_ui_sound).execute(snd_long_click);
          - lambda: |-
              if (id(hw_microphone)->get_mute_state()) {
                id(hw_microphone).set_mute_state(false);
              } else {
                id(hw_microphone).set_mute_state(true);
              }
          - script.execute: update_data


light:
  - id: !extend ledstrip_id
    effects:
      # Content Mode Effects
      # Effect CONTENT_BOOT
      - addressable_lambda:
          name: "Effect CONTENT_0" # BOOT
          update_interval: 50ms
          lambda: |-
            // Definiert die Geschwindigkeit und zwingt den Wert in eine Endlosschleife von 0 bis 255
            int wave_time = (millis() / 12) % 256;

            for (int i = 0; i < it.size(); i++) {
              // Berechnet den Helligkeitsverlauf basierend auf der LED-Position
              int v = wave_time + abs(i - it.size() / 2.0f) * 16;
              
              // Nutzt Modulo, damit die Welle endlos von außen nach innen "durchläuft"
              v = v % 256; 
              
              it[i] = Color(0, 0, v);
            }

      # Effect CONTENT_IDLE
      - addressable_lambda:
          name: "Effect CONTENT_1" # IDLE
          update_interval: 16ms
          lambda: |-
            auto color = id(idle_color);

            for (int i = 0; i < it.size(); i++) {
              it[i] = color;
            }

      # Effect CONTENT_PLAY
      - addressable_rainbow:
          name: "Effect CONTENT_2" # PLAY
          speed: 16
          width: 12
          
      # Effect CONTENT_PAUSE
      - addressable_lambda:
          name: "Effect CONTENT_3" # PAUSE
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 500.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(y, y, 0);  // Gelb
            }
      # Effect CONTENT_LISTEN
      - addressable_lambda:
          name: "Effect CONTENT_4"  # LISTEN
          update_interval: 20ms
          lambda: |-
            const int count = it.size();
            const float t = millis() / 250.0f;   // Puls-Geschwindigkeit
            const float pulse = (sin(t) + 1.0f) * 0.5f;  // 0..1
      
            const float center = (count - 1) / 2.0f;     // Mitte der LEDs
      
            for (int i = 0; i < count; i++) {
              float d = fabsf(i - center);               // Abstand zur Mitte
              float falloff = 1.0f - (d / center);       // 1.0 in der Mitte, 0.0 außen
              if (falloff < 0.0f) falloff = 0.0f;
      
              int brightness = int( falloff * pulse * 255 );
      
              // Farbe: Cyan-Blau wie dein Listening-Effekt
              it[i] = Color(0, 64, brightness);
            }
      # Effect CONTENT_THINK
      - addressable_lambda:
          name: "Effect CONTENT_5" # THINK
          update_interval: 20ms
          lambda: |-
            int pos = (millis() / 40) % it.size();
            pos = it.size() - pos;
            for (int i = 0; i < it.size(); i++) {
              int d = abs(i - pos);
              int b = max(0, 150 - d * 40);
              it[i] = Color(b, 0, b);
            }

      # Overlay Mode Effects
      # Effect OVERLAY_NONE
      - addressable_lambda:
          name: "Effect OVERLAY_0"
          update_interval: 250ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0,0,0);
            }
      # Effect OVERLAY_VOLUME
      - addressable_lambda:
          name: "Effect OVERLAY_1"
          update_interval: 20ms
          lambda: |-
            if (id(media_player_id).is_muted()) {
              float t = (millis() % 800) / 800.0f;
              float fade = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color(0, 0, int(128 * fade));
              }
              return;
            }

            float index = id(media_player_id).volume * it.size();

            for (int i = 0; i < it.size(); i++) {
              float fade = std::clamp(index - i, 0.2f, 1.0f);
              // falschrum eingebaut
              it[i] = Color(0, int(127*fade), int(255*fade));
            }
      # Effect OVERLAY_ERROR
      - addressable_lambda:
          name: "Effect OVERLAY_2"
          update_interval: 40ms
          lambda: |-
            float t = (millis() % 800) / 800.0f;
            float b = (sin(t * 2 * 3.14159f) + 1) / 2;  // 0–1
            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(int(200 * b), 0, 0);
            }
      # Effect CONTENT_ALARM
      - addressable_lambda:
          name: "Effect OVERLAY_3"
          update_interval: 50ms
          lambda: |-
            float t = (sin(millis() / 250.0f) + 1) / 2;  // langsames Atmen
            uint8_t y = 60 + (uint8_t)(t * 120);

            for (int i = 0; i < it.size(); i++) {
              it[i] = Color(0, y, 0);  // Rot
            }
      # Effect OVERLAY_ANNOUNCE
      - addressable_lambda:
          name: "Effect OVERLAY_4"
          update_interval: 20ms
          lambda: |-
            const int count = it.size();

            // Position des Scans (läuft von 0 bis count-1)
            int pos = (millis() / 40) % count;

            for (int i = 0; i < count; i++) {
              // Abstand zur Scan-Position
              int d = abs(i - pos);

              // Helligkeit abhängig vom Abstand (weicher Abfall)
              int b = max(0, 120 - d * 40);  // 120 = hell, 40 = Abfall pro LED

              it[i] = Color(b+75, b, b+75);  // Cyan-Blau
            }

######################################################################################

media_player:
  - id: !extend media_player_id

    on_announcement:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_announcement");
        id(show_announce_overlay).execute();
    on_play:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_play");
        id(set_content_mode).execute(${CONTENT_PLAY});
    on_pause:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_pause");
        id(set_content_mode).execute(${CONTENT_PAUSE});

    on_idle:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_idle");
        id(set_content_mode).execute(${CONTENT_IDLE});

    on_turn_on:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_turn_on");
        id(update_data).execute();
    on_turn_off:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_turn_off");
        id(update_data).execute();

    on_mute:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_unmute");
        id(show_volume_overlay).execute();
    on_unmute:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_unmute");
        id(show_volume_overlay).execute();

    on_volume:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_media_player_volume");
        id(show_volume_overlay).execute();

    on_state:
      - lambda: |-
          ESP_LOGI(__FILE__, "on_media_player_state: %s", media_player::media_player_state_to_string(id(media_player_id).state));

          switch (id(media_player_id).state) {
            case media_player::MEDIA_PLAYER_STATE_ANNOUNCING: {
              if (!id(is_ducking)) {
                ESP_LOGI(__FILE__, "enable ducking!!!!");
                id(media_mixing_input).apply_ducking(16, 300);
                id(is_ducking) = true;
              }
              break;
            }
            case media_player::MEDIA_PLAYER_STATE_PLAYING:
            case media_player::MEDIA_PLAYER_STATE_PAUSED:
            case media_player::MEDIA_PLAYER_STATE_IDLE: {
              if (id(is_ducking)) {
                ESP_LOGI(__FILE__, "disable ducking!!!!");
                id(media_mixing_input).apply_ducking(0, 300);
                id(is_ducking) = false;
              } else {
                ESP_LOGI(__FILE__, "no ducking skipped");
              }
              break;
            }
            case media_player::MEDIA_PLAYER_STATE_NONE:
            case media_player::MEDIA_PLAYER_STATE_OFF:
            case media_player::MEDIA_PLAYER_STATE_ON: {
              ESP_LOGW(__FILE__, "nothing");
              break;
            }
          }

voice_assistant:
  on_wake_word_detected:                         # wird im local-mode nie aufgerufen
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_wake_word_detected");
  on_idle:                                       # wird im local-mode nie aufgerufen
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_idle");

  on_client_connected: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_client_connected");
        id(play_ui_sound).execute(snd_chime_up);
    - micro_wake_word.start:           
  on_client_disconnected: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_client_disconnected");
        id(play_ui_sound).execute(snd_chime_down);

  on_start: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_start");
        id(command_message) = "";
        id(announce_message) = "";
        id(url_message) = "";
        id(error_code) = "";
        id(error_message) = "";
        id(intent_message) = "";

  on_listening: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_listening");
        id(set_content_mode).execute(${CONTENT_LISTEN});

  on_stt_end:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_stt_end \"%s\"", x.c_str() );
        id(command_message) = x;
        id(update_data).execute();

  on_stt_vad_start:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_stt_vad_start");
  on_stt_vad_end:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_stt_vad_end");
        id(play_ui_sound).execute(snd_thinking);
        id(set_content_mode).execute(${CONTENT_THINK});

  on_tts_start:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_tts_start \"%s\"", x.c_str() );
        id(announce_message) = x;
        id(play_ui_sound).execute(snd_success);
        id(update_data).execute();
  on_tts_end: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_tts_end \"%s\"", x.c_str() );
        id(url_message) = x;

  on_end: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_end");
    - wait_until: 
        condition:
          - not:
            - voice_assistant.is_running:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_finished");

    - script.execute: 
        id: set_content_mode
        mode: ${CONTENT_IDLE}
    - if:
        condition:
          - micro_wake_word.is_running:                 
        then: 
          - lambda: |-
              ESP_LOGI(__FILE__, "MWW already running!");
        else:
          - micro_wake_word.start: 

  on_error: 
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_error \"%s\" : \"%s\"", code.c_str(), message.c_str() );
        id(error_code) = code;
        id(error_message) = message;
        id(play_ui_sound).execute(snd_error);
    - script.execute: 
        id: set_content_mode
        mode: ${CONTENT_IDLE}
    # - media_player.stop: media_player_id
    - script.execute: 
        id: show_error_overlay
    - if:
        condition:
          - micro_wake_word.is_running:
        then: 
          - lambda: |-
              ESP_LOGI(__FILE__, "MWW already running!");
        else:
          - micro_wake_word.start: 

  on_intent_start:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_intent_start");
  on_intent_progress:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_intent_progress \"%s\"", x.c_str() );
        id(intent_message) = x;
  on_intent_end:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_intent_end");

  on_timer_started:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_timer_started");
        ESP_LOGI(__FILE__, "=== TIMER GESTARTET ===");
        ESP_LOGI(__FILE__, "  Name:       %s", timer.name.c_str());
        ESP_LOGI(__FILE__, "  ID:         %s", timer.id.c_str());
        ESP_LOGI(__FILE__, "  Dauer (s):  %lu", timer.total_seconds);
        id(update_data).execute();
  on_timer_finished:
    - lambda: |-
        ESP_LOGW(__FILE__, "on_voice_assistant_timer_finished");
        ESP_LOGW(__FILE__, "=== TIMER FERTIG ===");
        ESP_LOGI(__FILE__, "  Name:       %s", timer.name.c_str());
        ESP_LOGI(__FILE__, "  ID:         %s", timer.id.c_str());
        ESP_LOGI(__FILE__, "  Dauer (s):  %lu", timer.total_seconds);
        id(update_data).execute();
    - script.execute: 
        id: show_alarm_overlay
    # - homeassistant.service:
    #     service: tts.speak
    #     data:
    #       entity_id: tts.piper  # Deine TTS-Engine in HA (z.B. tts.piper oder tts.google_de)
    #       # Wir schicken den Ton zurück an diesen Satelliten:
    #       media_player_entity_id: ${media_player_entity_id}
    #       message: !lambda |-
    #         if (timer_name.empty()) {
    #           return std::string("Ein Timer ist abgelaufen!");
    #         } else {
    #           return "Dein " + timer_name + " Timer ist abgelaufen!";
    #         }          
  on_timer_cancelled:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_timer_cancelled");
        ESP_LOGI(__FILE__, "=== TIMER ABGEBROCHEN ===");
        ESP_LOGI(__FILE__, "  Name:       %s", timer.name.c_str());
        ESP_LOGI(__FILE__, "  ID:         %s", timer.id.c_str());
        ESP_LOGI(__FILE__, "  Dauer (s):  %lu", timer.total_seconds);
        ESP_LOGI(__FILE__, "  Restzeit:   %lu s", timer.seconds_left);
        id(update_data).execute();
  on_timer_updated:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_timer_updated");
        ESP_LOGI(__FILE__, "=== TIMER AKTUALISIERT ===");
        ESP_LOGI(__FILE__, "  Name:       %s", timer.name.c_str());
        ESP_LOGI(__FILE__, "  ID:         %s", timer.id.c_str());
        ESP_LOGI(__FILE__, "  Status:     %s", timer.is_active ? "Aktiv/Läuft" : "Pausiert");
        ESP_LOGI(__FILE__, "  Dauer (s):  %lu", timer.total_seconds);
        ESP_LOGI(__FILE__, "  Restzeit:   %lu s", timer.seconds_left);
        id(update_data).execute();
  on_timer_tick:
    - lambda: |-
        ESP_LOGI(__FILE__, "on_voice_assistant_timer_tick" );
        ESP_LOGI(__FILE__, "=== TIMER TICK ===");
        for (const auto &t : timers) {
          if (t.is_active) {
            // Wir rufen das Skript für jeden aktiven Timer direkt aus C++ auf
            ESP_LOGD(__FILE__, "- Timer '%s': %lu von %lu Sekunden", t.name.c_str(), t.seconds_left, t.total_seconds);
          }
        }
        id(update_data).execute();
    
micro_wake_word:
  on_wake_word_detected:
    then:
      - lambda: |-
          ESP_LOGI(__FILE__, "micro_wake_word_on_wake_word_detected \"%s\"", wake_word.c_str() );
          id(play_ui_sound).execute(snd_wake);
      - voice_assistant.start: 
          wake_word: !lambda return wake_word;
        


