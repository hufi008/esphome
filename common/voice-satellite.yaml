display:
  - platform: ssd1306_i2c
    model: SSD1306_128X64
    id: display_id
    address: 0x3c
    update_interval: 50ms
    lambda: |-
      // -------------------------------------------------------
      // 1a. GELBER HEADER-BEREICH (Pixel 0–15)
      // -------------------------------------------------------
      
      // Symbole rechts (jeweils 16x16)
      for (int i = 0; i < 4; i++) {
        auto* img = id(status_symbols)[i];
        
        // Prüft penibel, ob der Zeiger existiert UND nicht die Standard-Leeradresse 0x0 ist
        if (img != nullptr && img != 0) {
          it.image(112 - (i * 16), 0, img);
        }
      }

      // -------------------------------------------------------
      // 1b. BLAUER CONTENT-BEREICH (Pixel 16–63)
      // -------------------------------------------------------
      // Trennlinie zwischen GELB (oben) und BLAU (unten)
      it.line(0,15,127,15);
      //it.rectangle(0, 16, 128, 48);

      int cx = 64;
      int cy = 40;
      int width = 128;
      
      // Titel links
      it.print(0, 0, id(font_medium), id(title_text).c_str());
      
      if (id(image_icon) != nullptr) {
        it.image(1, 21, id(image_icon));
        cx+=16;
        width-=32;
      }

      auto scroll_marquee = [&](int cx, int cy, int width, display::BaseFont *font, const std::string &text) {
        // Textbreite messen
        int tx, ty, tw, th;
        it.get_text_bounds(cx, cy, text.c_str(), font, TextAlign::CENTER, &tx, &ty, &tw, &th);
      
        int tw2 = tw / 2;
        int w2 = width / 2;
        tx = cx - w2;   
        tw = width;
      
        // Clipping-Bereich setzen
        it.start_clipping(tx, ty, tx + tw, ty + th);
      
        if (tw2 > w2) {
            float max_amplitude = tw2 - w2; 
            
            // OPTISCHE FEINEINSTELLUNG:
            const float DURATION_MOVE_MS = 3000.0f; // Zeit für eine Richtung (3 Sek. = sehr entspannt)
            const float DURATION_PAUSE_MS = 1200.0f; // Standzeit am Rand in Millisekunden
            
            // Ein kompletter Zyklus (Hinweg + Pause + Rückweg + Pause)
            float total_cycle_ms = (DURATION_MOVE_MS * 2.0f) + (DURATION_PAUSE_MS * 2.0f);
            float current_time = fmodf(millis(), total_cycle_ms);
            
            float offset = 0.0f;
            
            if (current_time < DURATION_PAUSE_MS) {
                // 1. Pause am linken Rand
                offset = -max_amplitude;
            } 
            else if (current_time < DURATION_PAUSE_MS + DURATION_MOVE_MS) {
                // 2. Weiche Bewegung von links nach rechts (Ease-In-Out)
                float t = (current_time - DURATION_PAUSE_MS) / DURATION_MOVE_MS; // Fortschritt 0.0 bis 1.0
                
                // Offizielle Smoothstep-Formel: Erzeugt perfekte Beschleunigung und Bremsung
                float smooth_t = t * t * (3.0f - 2.0f * t); 
                
                offset = -max_amplitude + (smooth_t * max_amplitude * 2.0f);
            } 
            else if (current_time < (DURATION_PAUSE_MS * 2.0f) + DURATION_MOVE_MS) {
                // 3. Pause am rechten Rand
                offset = max_amplitude;
            } 
            else {
                // 4. Weiche Bewegung von rechts nach links (Ease-In-Out)
                float t = (current_time - (DURATION_PAUSE_MS * 2.0f) - DURATION_MOVE_MS) / DURATION_MOVE_MS;
                float smooth_t = t * t * (3.0f - 2.0f * t);
                
                offset = max_amplitude - (smooth_t * max_amplitude * 2.0f);
            }
            
            // Zeichnet den Text perfekt ausbalanciert
            it.print(cx - offset, cy, font, TextAlign::CENTER, text.c_str());
        } else {
            it.print(cx, cy, font, TextAlign::CENTER, text.c_str());
        }
      
        // Clipping beenden
        it.end_clipping();
      };


      if (id(idle_message3).empty() && id(idle_message2).empty()) {
        // --- FALL 1: Nur die erste Zeile ist befüllt -> Maximal groß ---
        scroll_marquee(cx, cy, width, id(font_huge), id(idle_message1));

      } else if (id(idle_message3).empty()) {
        // --- FALL 2: Zeile 1 und 2 sind befüllt -> Große Schrift ---
        scroll_marquee(cx, cy - 9, width, id(font_large), id(idle_message1));
        scroll_marquee(cx, cy + 9, width, id(font_large), id(idle_message2));

      } else {
        // --- FALL 3: Alle 3 Zeilen sind befüllt -> Mittlere Schrift ---
        scroll_marquee(cx, cy - 12, width, id(font_medium), id(idle_message1));
        scroll_marquee(cx, cy,      width, id(font_medium), id(idle_message2));
        scroll_marquee(cx, cy + 12, width, id(font_medium), id(idle_message3));
      }

######################################################################################
      
# interval für page messages
interval:
  - id: update_timer
    interval: 15s
    then:
      # Phase 1: Display-Texte aktualisieren
      - script.execute: update_data

      # Phase 2: Die permanent gesammelten Peaks der letzten 15s an HA senden
      - lambda: |-
          id(sensor_mic_left_peak).publish_state(id(mic_peak_left));
          id(sensor_mic_right_peak).publish_state(id(mic_peak_right));
          
          //ESP_LOGI("mic_test", "15s-Peak-Report. Left: %d | Right: %d", id(mic_peak_left), id(mic_peak_right));
          
          // Werte sofort nullen, um für die nächsten 15 Sekunden neu zu sammeln
          id(mic_peak_left) = 0;
          id(mic_peak_right) = 0;

# I2S Audio Bus
i2s_audio:
  # Eingang (Stereo INMP441)
  - id: i2s_bus_in
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin: ${mic_sck_pin}

  # Ausgang (Stereo MAX98357)
  - id: i2s_bus_out
    i2s_lrclk_pin: ${amp_lrclk_pin}
    i2s_bclk_pin: ${amp_bclk_pin}
   
# Microphone INMP441
microphone:
  - platform: i2s_audio
    id: hw_microphone
    i2s_audio_id: i2s_bus_in
    adc_type: external
    i2s_din_pin: ${mic_sd_pin}
    pdm: false
    bits_per_sample: 32bit
    sample_rate: 16000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    i2s_mode: primary
    on_data:
      - lambda: |-
          if (x.empty()) return;

          size_t total_bytes = x.size();
          int32_t max_l = 0;
          int32_t max_r = 0;

          // Ein kompletter Stereo-Frame (Links 4 Bytes + Rechts 4 Bytes) benötigt genau 8 Bytes.
          for (size_t i = 0; i + 7 < total_bytes; i += 8) {
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den LINKEN Kanal
            int32_t l_val = (int32_t)((x[i + 3] << 24) | (x[i + 2] << 16) | (x[i + 1] << 8) | x[i]);
            
            // Ihr funktionierender Little-Endian-Zusammenbau für den RECHTEN Kanal
            int32_t r_val = (int32_t)((x[i + 7] << 24) | (x[i + 6] << 16) | (x[i + 5] << 8) | x[i + 4]);

            // Absolutwerte für die Peak-Messung
            int32_t abs_l = std::abs(l_val);
            int32_t abs_r = std::abs(r_val);

            if (abs_l > max_l) max_l = abs_l;
            if (abs_r > max_r) max_r = abs_r;
          }

          // Skalierung auf den 16-Bit-Bereich (>> 16) wie in Ihrem Original
          int16_t peak_l_16 = (int16_t)(max_l >> 16);
          int16_t peak_r_16 = (int16_t)(max_r >> 16);

          // Zuweisung an Ihre aktuellen globalen Peak-Speicher
          if (peak_l_16 > id(mic_peak_left))  id(mic_peak_left) = peak_l_16;
          if (peak_r_16 > id(mic_peak_right)) id(mic_peak_right) = peak_r_16;

          
# Amplifier MAX 98357
speaker:
  # A) Der physische I2S Hardware-Lautsprecher (Ausgang)
  - platform: i2s_audio
    id: hw_speaker
    i2s_audio_id: i2s_bus_out
    dac_type: external
    i2s_dout_pin: ${amp_dout_pin}
    bits_per_sample: 32bit
    sample_rate: 48000
    mclk_multiple: 256
    channel: stereo
    num_channels: 2
    buffer_duration: 500ms
    i2s_mode: primary

  # B) Der digitale Audio-Mixer
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 2
    source_speakers:
      - id: media_mixing_input
        timeout: never
      - id: announcement_mixing_input
        timeout: never

  # C) Virtueller Resampler für Musik-Medien
  - platform: resampler
    id: media_source_speaker
    output_speaker: media_mixing_input

  # D) Virtueller Resampler für Durchsagen (Announcements)
  - platform: resampler
    id: announcement_source_speaker
    output_speaker: announcement_mixing_input

audio:
  codecs:
    flac:
    mp3:
    wav:
      
media_player:
  - platform: speaker
    id: media_player_id
    name: Audio Player
    buffer_size: 4000000
    icon: "mdi:speaker-message"
    task_stack_in_psram: true
    volume_initial: 50%
    volume_increment: 5%
    volume_min: 0%
    volume_max: 100%
    files:
      - id: snd_boot
        file: "sounds/boot.flac"
      - id: snd_va_chime_up
        file: "sounds/va_chime_up.flac"
      - id: snd_va_chime_down
        file: "sounds/va_chime_down.flac"
      - id: snd_error
        file: "sounds/error.flac"
      - id: snd_success
        file: "sounds/success.flac"
      - id: snd_va_wake
        file: "sounds/va_wake.flac"
      - id: snd_single_click
        file: "sounds/single_click.flac"
      - id: snd_double_click
        file: "sounds/double_click.flac"
      - id: snd_long_click
        file: "sounds/long_click.flac"

    media_pipeline:
      speaker: media_source_speaker
      num_channels: 2
      sample_rate: 48000
      format: 'NONE'
    announcement_pipeline:
      speaker: announcement_source_speaker
      sample_rate: 16000
      num_channels: 1
      format: FLAC

    on_announcement:
      - logger.log:
          level: INFO
          format: "Ducking enabled"
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 16
          duration: 0.3s
      - if:
          condition:
            lambda: 'return id(skip_next_announcement);'
          then:
            # Skip aktiv → nur zurücksetzen (Lokaler Klickton abgefangen)
            - lambda: 'id(skip_next_announcement) = false;'
          else:
            # Skip NICHT aktiv → regulär ausführen (Echtes HA-Announcement)
            - script.execute: on_media_player_announcement
    on_play:
      - logger.log:
          level: INFO
          format: "Micro Wake Word stopped"
      - micro_wake_word.stop: 
      - logger.log:
          level: INFO
          format: "Ducking disabled"          
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 0.3s
      - script.execute: on_media_player_play
    on_pause:
      - if:
          condition:
            lambda: 'return !id(mww).is_running();'
          then:
            - logger.log:
                level: INFO
                format: "Micro Wake Word started (pause)"
            - micro_wake_word.start: 
      - script.execute: on_media_player_pause

    on_idle:      
      - if:
          condition:
            lambda: 'return !id(mww).is_running();'
          then:
            - logger.log:
                level: INFO
                format: "Micro Wake Word started (idle)"
            - micro_wake_word.start: 
      - script.execute: on_media_player_idle
        
    on_turn_on:
      - script.execute: on_media_player_turn_on
    on_turn_off:
      - script.execute: on_media_player_turn_off
    on_mute:
      - script.execute: on_media_player_mute
    on_unmute:
      - script.execute: on_media_player_unmute
    on_volume:
      - script.execute: on_media_player_volume
    on_state:
      - script.execute: on_media_player_state

voice_assistant:
  id: va
  micro_wake_word: 
  use_wake_word: false
  microphone:
    - channels: ["0"]
      microphone: hw_microphone
    - channels: ["1"]
      microphone: hw_microphone
  media_player: media_player_id
  auto_gain: 15dBFS
  conversation_timeout: 300s
  noise_suppression_level: 2
  volume_multiplier: 4

  on_client_connected: 
    - script.execute: on_voice_assistant_client_connected
  on_client_disconnected: 
    - script.execute: on_voice_assistant_client_disconnected
  on_idle: 
    - script.execute: on_voice_assistant_idle
  on_listening: 
    - script.execute: on_voice_assistant_listening
  on_start: 
    - script.execute: on_voice_assistant_start
    - globals.set: 
        id: command_message
        value: !lambda return "";
    - globals.set: 
        id: announce_message
        value: !lambda return "";
    - globals.set: 
        id: url_message
        value: !lambda return "";
    - globals.set: 
        id: error_code
        value: !lambda return "";
    - globals.set: 
        id: error_message
        value: !lambda return "";
    - globals.set: 
        id: intent_message
        value: !lambda return "";
      
  on_stt_end: 
    - globals.set: 
        id: command_message
        value: !lambda return x;
    - logger.log: 
        level: INFO
        format: "Command %s"
        args: [ id(command_message).c_str() ]
    - script.execute: on_voice_assistant_stt_end
  on_stt_vad_start:
    - script.execute: on_voice_assistant_stt_vad_start
  on_stt_vad_end:
    - script.execute: on_voice_assistant_stt_vad_end
      
  on_tts_start:
    - globals.set: 
        id: announce_message
        value: !lambda return x;    
    - logger.log: 
        level: INFO
        format: "Announce %s"
        args: [ id(announce_message).c_str() ]
    - script.execute: on_voice_assistant_tts_start
  on_tts_end: 
    - globals.set: 
        id: url_message
        value: !lambda return x;    
    - logger.log:
        level: INFO
        format: "URL %s"
        args: [ id(url_message).c_str() ]
    - script.execute: on_voice_assistant_tts_end
  on_end: 
    - script.execute: on_voice_assistant_end
    - script.wait: on_voice_assistant_end
  on_error: 
    - globals.set: 
        id: error_code
        value: !lambda return code;
    - globals.set: 
        id: error_message
        value: !lambda return message;
    - script.execute: on_voice_assistant_error
    - script.wait: on_voice_assistant_error
  # on_intent_start:
  on_intent_progress:
    - globals.set: 
        id: intent_message
        value: !lambda return x;
    - logger.log:
        level: INFO
        format: "Intent %s"
        args: [ id(intent_message).c_str() ]
    - script.execute: on_voice_assistant_intent
  # on_intent_end:
    
micro_wake_word:
  id: mww
  task_stack_in_psram: true
  vad:
    model: https://github.com/esphome/micro-wake-word-models/raw/main/models/v2/vad.json
    probability_cutoff: 55%
    sliding_window_size: 10
  models:
    - model: okay_nabu
    - model: hey_jarvis
    - model: alexa
  on_wake_word_detected:
    then:
      - script.execute:
          id: on_micro_wake_word_on_wake_word_detected
          ww: !lambda 'return wake_word;'

        
